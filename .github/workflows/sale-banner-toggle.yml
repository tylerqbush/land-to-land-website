name: Sale Banner Toggle

# One-off triggers for the America's 250th sale (July 1-6, 2026, ET).
# src/_data/sale.js gates the banner by real-world date at build time, but
# a rebuild only happens on push. These two runs force an empty commit at
# the exact activation/deactivation boundaries so Cloudflare Pages rebuilds
# right on time instead of waiting for the next Airtable data change.
#
# Delete this file after July 7, 2026 — the cron dates below will otherwise
# recur every year and trigger a harmless but pointless rebuild.

on:
  schedule:
    - cron: '5 4 1 7 *' # July 1, 12:05am ET (sale activates)
    - cron: '5 4 7 7 *' # July 7, 12:05am ET (sale deactivates)
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Empty commit to trigger Cloudflare Pages rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "trigger: rebuild for sale banner date change"
          git push
